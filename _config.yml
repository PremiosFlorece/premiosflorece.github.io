# Site settings
title: Premios Florece
email: premiosflorece@gmail.com
url: https://premiosflorece.com
baseurl: ""
description: "Your Cannabis Awards.  Non profit foundation dedicated to award the best products in the Puerto Rico medical cannabis industry as selected by our community. Vote for your favorites."
keywords: "premios, florece, cannabis"
skills: "Your Cannabis Awards"
meta_author: Jean Manzano
favicon: 'img/favicon.ico'

# Google webmaster tools
google_verify:

# https://ssl.bing.com/webmaster/configure/verify/ownership Option 2 content= goes here
bing_verify:

# Contact form:
# - static : pass through formspree.io to validate email sending
# - disqus : replace contact form by disqus thread
# - comment the line below if you want to stick with the default PHP contact form
# BACKUP: Disqus was removed in favor of modern PHP contact form
# contact: disqus
# disqus_shortname: premios-florece

# Color settings (hex-codes without the leading hash-tag)
# Modern, cohesive cannabis-themed palette
color:
  primary: 1ecc71      # Modern vibrant green (professional medical feel)
  primary-rgb: "30,204,113"
  secondary: 0d1117    # Deep charcoal for sophistication
  secondary-dark: 0a0e27
  accent: 00d4aa       # Modern teal accent
  accent-rgb: "0,212,170"

# Footer settings
footer:
  copyright: Premios Florece
  location: Location
  social: Around the Web
  credits: Credits

# Social networks usernames (many more available: google-plus, flickr, dribbble, pinterest, instagram, tumblr, linkedin, etc.)
social:
  - title: twitter
    url: http://twitter.com/PremiosFlorece
  - title: facebook
    url: https://www.facebook.com/FestivalFloreced/
  - title: instagram
    url: https://www.instagram.com/FestivalFlorece/
  # - title: stack-overflow
  #   url: http://stackoverflow.com/questions/tagged/jekyll
  # - title: bitbucket
  #   url: http://bitbucket.org/jekyll
  - title: github
    url: http://github.com/PremiosFlorece

# Postal address (add as many lines as necessary)
address:
  - line: TBD
  # - line: PR-156, Caguas, 00726

# Credits content
credits: 'Premios Florece is a non profit foundation. Visit our event: <a href="http://festivalflorece.com">Festival Florece</a>.'

# Build settings
markdown: kramdown
permalink: pretty

#for posts
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      permalink: ""

plugins:
- jekyll-redirect-from
- jekyll-paginate
- jekyll-sitemap
- jekyll-feed
- jekyll-seo-tag
- jekyll-archives
