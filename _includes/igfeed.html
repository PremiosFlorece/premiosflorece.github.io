        <div class="col-lg-12 text-center">
          <h2>Social Feed</h2>
          <hr class="star-primary">
        </div>

      <div id="instafeed" class="row"></div>

  <!-- Instagram Feed Script -->
  <script src="{{ "/js/instafeed.min.js" | prepend: site.baseurl }}"></script>
  <script>
    var feed = new Instafeed({
      accessToken: 'YOUR_INSTAGRAM_ACCESS_TOKEN',
      limit: 12,
      template: '<div class="col-sm-6 col-md-3 sponsor-item"><a href="{{link}}" target="_blank" class="sponsor-link"><img src="{{image}}" class="img-responsive" alt="{{caption}}"></a></div>'
    });
    feed.run();
  </script>
