<!-- Age verification popup trigger -->
<script>
    // Function to show age verification popup
    function showAgeVerificationPopup() {
      // Check if user already verified
      if (localStorage.getItem('ageVerified') === 'true') {
        return;
      }

      if (typeof Swal === 'undefined') {
        console.warn('SweetAlert2 not loaded yet, retrying...');
        setTimeout(showAgeVerificationPopup, 500);
        return;
      }

      Swal.fire({
        title: "Age Verification",
        html: "Please confirm that you are 21 years or older.",
        icon: "warning",
        showCancelButton: true,
        allowOutsideClick: false,
        allowEscapeKey: false,
        confirmButtonText: "Yes, I'm 21+",
        cancelButtonText: "No, I'm not 21",
        reverseButtons: true
      }).then((result) => {
        if (result.isConfirmed) {
          // Store verification in localStorage
          localStorage.setItem('ageVerified', 'true');
        } else if (result.dismiss === Swal.DismissReason.cancel) {
          // Redirect for underage visitors
          Swal.fire({
            title: "Sorry!",
            text: "You must be 21 years or older to access this content.",
            icon: "error",
            allowOutsideClick: false
          }).then(() => {
            window.location.href = "/underage.html";
          });
        }
      });
    }

    // Show popup when DOM is ready
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', showAgeVerificationPopup);
    } else {
      showAgeVerificationPopup();
    }
  </script>
