<!-- Age verification popup trigger -->
<script>
    // Function to show age verification popup
    function showAgeVerificationPopup() {
      // Check if user already verified
      if (localStorage.getItem('ageVerified') === 'true') {
        console.log('[Age Verify] User already verified, skipping popup');
        return;
      }

      if (typeof Swal === 'undefined') {
        console.warn('[Age Verify] SweetAlert2 not loaded yet, retrying in 100ms...');
        setTimeout(showAgeVerificationPopup, 100);
        return;
      }

      console.log('[Age Verify] Showing age verification popup');
      
      Swal.fire({
        title: "Age Verification",
        html: "Please confirm that you are 21 years or older.",
        icon: "warning",
        showCancelButton: true,
        allowOutsideClick: false,
        allowEscapeKey: false,
        didOpen: function(modal) {
          console.log('[Age Verify] Modal opened');
        },
        confirmButtonText: "Yes, I'm 21+",
        cancelButtonText: "No, I'm not 21",
        reverseButtons: true
      }).then((result) => {
        if (result.isConfirmed) {
          console.log('[Age Verify] User confirmed age');
          // Store verification in localStorage
          localStorage.setItem('ageVerified', 'true');
        } else if (result.dismiss === Swal.DismissReason.cancel) {
          console.log('[Age Verify] User denied age confirmation');
          // Redirect for underage visitors
          Swal.fire({
            title: "Sorry!",
            text: "You must be 21 years or older to access this content.",
            icon: "error",
            allowOutsideClick: false
          }).then(() => {
            window.location.href = "/underage.html";
          });
        }
      });
    }

    // Show popup when everything is ready
    function initAgeVerification() {
      console.log('[Age Verify] Init called, document ready state:', document.readyState);
      setTimeout(showAgeVerificationPopup, 500);
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initAgeVerification);
    } else {
      initAgeVerification();
    }
  </script>
