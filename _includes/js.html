<!-- Error handling script -->
<script>
// Simple console noise filter for extension-related errors
(function() {
  const originalError = console.error;
  console.error = function(...args) {
    const message = args.join(' ').toLowerCase();
    // Filter out common extension/security library noise
    if (message.includes('lockdown') || 
        message.includes('removing intrinsics') || 
        message.includes('mapprototype') ||
        message.includes('dateprototype') ||
        message.includes('ses removing')) {
      return; // Silently ignore these
    }
    // Pass through actual errors
    originalError.apply(console, args);
  };
})();

// Check if critical libraries loaded
document.addEventListener('DOMContentLoaded', function() {
  if (typeof jQuery === 'undefined') {
    console.warn('jQuery failed to load');
  }
  if (typeof bootstrap === 'undefined') {
    console.warn('Bootstrap failed to load');
  }
  if (typeof Swal === 'undefined') {
    console.warn('SweetAlert2 failed to load');
  }
});
</script>
