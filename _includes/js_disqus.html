<script type="text/javascript">
  try {
    /* * * CONFIGURATION VARIABLES: EDIT BEFORE PASTING INTO YOUR WEBPAGE * * */
    var disqus_shortname = '{{ site.disqus_shortname }}'; // required: replace example with your forum shortname

    /* * * DON'T EDIT BELOW THIS LINE * * */
    (function () {
      try {
        var dsq = document.createElement('script'); 
        dsq.type = 'text/javascript'; 
        dsq.async = true;
        dsq.src = '//' + disqus_shortname + '.disqus.com/embed.js';
        dsq.onerror = function() {
          console.warn('[Disqus] Failed to load embed script');
        };
        var disqusTarget = document.getElementById('disqus_thread');
        if (disqusTarget) {
          disqusTarget.appendChild(dsq);
        }
      } catch (e) {
        console.warn('[Disqus] Error loading embed:', e.message);
      }
    })();

    /* * * DON'T EDIT BELOW THIS LINE * * */
    (function () {
      try {
        var s = document.createElement('script'); 
        s.async = true;
        s.type = 'text/javascript';
        s.src = '//' + disqus_shortname + '.disqus.com/count.js';
        s.onerror = function() {
          console.warn('[Disqus] Failed to load count script');
        };
        var disqusTarget = document.getElementById('disqus_thread');
        if (disqusTarget) {
          disqusTarget.appendChild(s);
        }
      } catch (e) {
        console.warn('[Disqus] Error loading count:', e.message);
      }
    }());
  } catch (e) {
    console.warn('[Disqus] General initialization error:', e.message);
  }
</script>
</script>
