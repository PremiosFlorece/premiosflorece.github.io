<script type="text/javascript">
  /* * * CONFIGURATION VARIABLES * * */
  var disqus_config = function () {
    this.page.url = window.location.href;
    this.page.identifier = window.location.pathname;
  };

  var disqus_shortname = '{{ site.disqus_shortname }}'; // required: replace with your forum shortname

  /* * * DON'T EDIT BELOW THIS LINE * * */
  (function() {
    // Check if Disqus is blocked
    var disqusThread = document.getElementById('disqus_thread');
    if (!disqusThread) {
      console.warn('Disqus thread element not found');
      return;
    }

    // Create fallback message for when Disqus is blocked — white card like contact page
    function showDisqusBlocked() {
      disqusThread.innerHTML = '<div style="max-width:640px;margin:0 auto;padding:28px;background:#ffffff;border:1px solid #e9ecef;border-radius:8px;box-shadow:0 6px 18px rgba(18,28,42,0.06); text-align:center;">' +
        '<h5 style="margin-top:0;color:#2c3e50;">💬 Comments Section</h5>' +
        '<p style="margin: 12px 0; color:#333;">Comments are powered by Disqus but appear to be blocked by your browser\'s tracking protection.</p>' +
        '<p style="margin: 8px 0; font-size: 14px; color: #666;">To view comments, disable tracking protection for this site or allow premiosflorece.com in your browser settings.</p>' +
        '<div style="margin-top:14px;"><a href="https://disqus.com/" target="_blank" rel="noopener" style="color:#007bff;text-decoration:none;">Learn about Disqus</a></div>' +
        '</div>';
    }

    try {
      var d = document;

      // Diagnostic log: ensure shortname is present
      console.debug('[Disqus] shortname:', disqus_shortname);

      // Robust loader with retries and diagnostics
      function loadDisqus(attempt) {
        attempt = attempt || 1;
        var s = d.createElement('script');
        var src = 'https://' + disqus_shortname + '.disqus.com/embed.js';
        s.src = src;
        s.async = true;
        s.setAttribute('data-timestamp', +new Date());

        console.debug('[Disqus] load attempt', attempt, 'src=', src);

        var loaded = false;
        s.onload = function() {
          loaded = true;
          console.debug('[Disqus] embed script loaded (attempt', attempt + ')');
          // Small delay to let Disqus initialize
          setTimeout(function() {
            if (typeof DISQUS === 'undefined') {
              console.warn('[Disqus] DISQUS global not found after load');
              // fallback UI
              showDisqusBlocked();
            } else {
              console.debug('[Disqus] DISQUS initialized');
            }
          }, 500);
        };

        s.onerror = function(err) {
          console.warn('[Disqus] script error on attempt', attempt, err || 'error');
          // remove the failing script node
          if (s.parentNode) s.parentNode.removeChild(s);
          if (attempt < 3) {
            var delay = 800 * attempt; // exponential-ish backoff
            console.debug('[Disqus] retrying in', delay, 'ms');
            setTimeout(function() { loadDisqus(attempt + 1); }, delay);
          } else {
            console.warn('[Disqus] failed to load after', attempt, 'attempts');
            showDisqusBlocked();
          }
        };

        // Fallback if iframe not created after timeout
        setTimeout(function() {
          if (!loaded || !document.querySelector('#disqus_thread iframe')) {
            console.debug('[Disqus] iframe not found after timeout (attempt', attempt + ')');
            // if we haven't already errored, trigger a retry or fallback
            if (!loaded && attempt < 3) {
              if (s.parentNode) s.parentNode.removeChild(s);
              loadDisqus(attempt + 1);
              return;
            }
            if (!document.querySelector('#disqus_thread iframe')) {
              showDisqusBlocked();
            }
          }
        }, 6000 + (attempt * 400));

        (d.head || d.body).appendChild(s);
      }

      // If shortname is missing, show fallback immediately and log
      if (!disqus_shortname || disqus_shortname.indexOf('{{') === 0) {
        console.warn('[Disqus] disqus_shortname seems empty or not set:', disqus_shortname);
        showDisqusBlocked();
      } else {
        loadDisqus(1);
      }
    } catch (e) {
      console.warn('Disqus loading error:', e);
      showDisqusBlocked();
    }
  })();
</script>
